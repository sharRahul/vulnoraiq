services:
  vulnoraiq-web:
    build: .
    image: vulnoraiq:docker-lab
    container_name: vulnoraiq-web
    restart: unless-stopped
    init: true
    read_only: false
    ports:
      - "127.0.0.1:8787:8787"
    env_file:
      - .env.docker.example
    environment:
      VULNORAIQ_RUN_MODE: docker_lab
      VULNORAIQ_HOST: 0.0.0.0
      VULNORAIQ_PORT: "8787"
      VULNORAIQ_CONFIG_DIR: /app/config
      VULNORAIQ_TARGET_CONFIG: targets.docker.yaml
      VULNORAIQ_JOB_STORE_PATH: /data/jobs.db
      VULNORAIQ_WEB_OUTPUT_ROOT: /data/reports
      VULNORAIQ_EVIDENCE_DIR: /data/evidence
      VULNORAIQ_AUDIT_DIR: /data/audit
      VULNORAIQ_AUTH_MODE: local_admin
      VULNORAIQ_LOCAL_ADMIN_BIND_OK: "true"
      VULNORAIQ_AGENT_LAB_ROOT: /data/agent_lab
      VULNORAIQ_AGENT_LAB_PROJECTS_ROOT: /data/agent_lab/projects
      VULNORAIQ_AGENT_LAB_ALLOWED_GIT_HOSTS: github.com,gitlab.com,bitbucket.org
      VULNORAIQ_MAX_REQUEST_BODY: "52428800"
    volumes:
      - vulnoraiq_data:/data
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./projects:/app/projects:ro
    group_add:
      - "999"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vulnoraiq-lab
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  test-runner:
    build: .
    image: vulnoraiq:docker-lab
    profiles: ["test"]
    env_file:
      - .env.docker.example
    environment:
      VULNORAIQ_CONFIG_DIR: /app/config
      VULNORAIQ_TARGET_CONFIG: targets.docker.yaml
      VULNORAIQ_JOB_STORE_PATH: /data/jobs.db
      VULNORAIQ_WEB_OUTPUT_ROOT: /data/reports
      VULNORAIQ_EVIDENCE_DIR: /data/evidence
    volumes:
      - vulnoraiq_data:/data
      - .:/app
    depends_on:
      vulnoraiq-web:
        condition: service_healthy
    networks:
      - vulnoraiq-lab
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  vulnoraiq-lab:
    driver: bridge

volumes:
  vulnoraiq_data:
