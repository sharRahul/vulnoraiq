name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pip-audit

      - name: Dependency consistency check
        run: python -m pip check

      - name: Dependency vulnerability audit
        continue-on-error: true
        run: python -m pip_audit 2>&1 || true

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy .

      - name: Run tests
        run: |
          mkdir -p reports/output/ci-logs
          pytest -q 2>&1 | tee reports/output/ci-logs/pytest-${{ matrix.python-version }}.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-pytest-log-${{ matrix.python-version }}
          path: reports/output/ci-logs/pytest-${{ matrix.python-version }}.log

      - name: Validate package metadata
        run: python scripts/validate_package_metadata.py

      - name: Validate OWASP/MITRE mapping metadata
        run: python scripts/validate_owasp_atlas_mappings.py

      - name: Validate GenAI security readiness
        run: python scripts/validate_genai_readiness.py

      - name: Run production-testing readiness gate
        run: python scripts/validate_production_testing_readiness.py --output-dir reports/output/production-readiness

      - name: Run demo scan
        run: |
          python scripts/run_scan.py \
            --target demo \
            --profile baseline \
            --output reports/output/ci-demo-report.md \
            --json-output reports/output/ci-demo-report.json \
            --sarif-output reports/output/ci-demo-report.sarif \
            --dashboard-output reports/output/ci-demo-dashboard.md \
            --html-dashboard-output reports/output/ci-demo-dashboard.html

      - name: Run functional acceptance readiness path
        if: matrix.python-version == '3.12'
        run: |
          python scripts/validate_production_testing_readiness.py \
            --run-functional \
            --output-dir reports/output/production-readiness \
            --screenshot docs/assets/vulnoraiq-dashboard-example.svg

      - name: Upload readiness artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-production-testing-readiness
          path: |
            reports/output/production-readiness/**
            reports/output/ci-demo-report.md
            reports/output/ci-demo-report.json
            reports/output/ci-demo-report.sarif
            reports/output/ci-demo-dashboard.md
            reports/output/ci-demo-dashboard.html
