name: Build Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag name to embed in artifact names"
        required: true
        default: "0.2.0"
      upload_to_release:
        description: "Upload artifacts to an existing GitHub Release for this version/tag"
        required: true
        type: boolean
        default: false
      signing_mode:
        description: "Signing policy for release artifacts"
        required: true
        type: choice
        options:
          - attestation-only
          - gpg-if-configured
          - require-gpg
        default: gpg-if-configured
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-platform-release:
    name: Build ${{ matrix.platform }} release package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            extension: zip
          - platform: linux
            os: ubuntu-latest
            extension: tar.gz
          - platform: macos
            os: macos-latest
            extension: dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node for React console build
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "VULNORAIQ_RELEASE_VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "VULNORAIQ_RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Install release build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,release]

      - name: Build React console assets
        run: |
          cd webui/console
          npm ci
          npm run build

      - name: Validate release metadata and readiness
        run: |
          python scripts/validate_package_metadata.py
          python scripts/validate_owasp_atlas_mappings.py
          python scripts/validate_genai_readiness.py
          python scripts/validate_production_testing_readiness.py --output-dir reports/output/production-readiness

      - name: Build platform package
        run: |
          python scripts/build_platform_release_package.py --platform ${{ matrix.platform }} --version "$env:VULNORAIQ_RELEASE_VERSION"
        if: runner.os == 'Windows'

      - name: Build platform package
        run: |
          python scripts/build_platform_release_package.py --platform ${{ matrix.platform }} --version "$VULNORAIQ_RELEASE_VERSION"
        if: runner.os != 'Windows'

      - name: Upload unsigned package for signing job
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-${{ env.VULNORAIQ_RELEASE_VERSION }}-${{ matrix.platform }}
          path: dist/release/vulnoraiq-${{ env.VULNORAIQ_RELEASE_VERSION }}-${{ matrix.platform }}.${{ matrix.extension }}
          if-no-files-found: error

  sign-and-publish:
    name: Sign, attest, and publish release artifacts
    runs-on: ubuntu-latest
    needs: [build-platform-release]
    steps:
      - name: Resolve release version and signing mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "VULNORAIQ_RELEASE_VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
            echo "VULNORAIQ_SIGNING_MODE=gpg-if-configured" >> "$GITHUB_ENV"
          else
            echo "VULNORAIQ_RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "VULNORAIQ_SIGNING_MODE=${{ inputs.signing_mode }}" >> "$GITHUB_ENV"
          fi

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: vulnoraiq-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist/release
          rm -f SHA256SUMS.txt
          find . -maxdepth 1 -type f -name "vulnoraiq-${VULNORAIQ_RELEASE_VERSION}-*" | sort | while read -r artifact; do
            clean="${artifact#./}"
            sha256sum "$clean" | tee "$clean.sha256" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Optional GPG detached signatures
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_GPG_PRIVATE_KEY}" ]]; then
            if [[ "${VULNORAIQ_SIGNING_MODE}" == "require-gpg" ]]; then
              echo "RELEASE_GPG_PRIVATE_KEY is required because signing_mode=require-gpg"
              exit 1
            fi
            echo "No RELEASE_GPG_PRIVATE_KEY configured; skipping detached GPG signatures."
            exit 0
          fi
          export GNUPGHOME="$(mktemp -d)"
          printf '%s' "${RELEASE_GPG_PRIVATE_KEY}" | gpg --batch --import
          cd dist/release
          find . -maxdepth 1 -type f \( -name "vulnoraiq-${VULNORAIQ_RELEASE_VERSION}-*" -o -name "SHA256SUMS.txt" \) \
            ! -name "*.sha256" ! -name "*.asc" | sort | while read -r artifact; do
              clean="${artifact#./}"
              gpg --batch --yes --pinentry-mode loopback --passphrase "${RELEASE_GPG_PASSPHRASE:-}" --armor --detach-sign "$clean"
            done

      - name: Create GitHub artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/release/*

      - name: Upload signed release bundle
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-${{ env.VULNORAIQ_RELEASE_VERSION }}-signed-release
          path: dist/release/*
          if-no-files-found: error

      - name: Upload artifacts to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${VULNORAIQ_RELEASE_VERSION}" dist/release/* --clobber
