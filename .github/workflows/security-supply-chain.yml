name: Security Supply Chain

on:
  # Run on PRs to give reviewers security artifacts before code lands.
  pull_request:
    branches: ["main"]
  # Run on main and release tags so the default branch receives fresh scan evidence.
  push:
    branches: ["main"]
    tags: ["v*"]
  # Maintainers can also run the pipeline on demand and optionally publish/sign an image.
  workflow_dispatch:
    inputs:
      publish_image:
        description: "Push the built container image to GHCR and sign it with Cosign"
        required: true
        type: boolean
        default: false
      enforce_security_gate:
        description: "Fail the run on HIGH/CRITICAL Trivy findings"
        required: true
        type: boolean
        default: false
      image_tag:
        description: "Optional image tag for manual runs. Defaults to sha-<commit>."
        required: false
        default: ""

permissions:
  # Read repository contents for checkout and filesystem scans.
  contents: read
  # Publish to GHCR when running on main/tags or manual publish_image=true.
  packages: write
  # Upload SARIF reports to GitHub code scanning where available.
  security-events: write
  # Required by keyless Cosign signing through GitHub OIDC.
  id-token: write
  # Required by GitHub artifact attestations if enabled later for image/package provenance.
  attestations: write

jobs:
  security-supply-chain:
    name: Security scans, SBOM, and image signing
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: reports/output/security-supply-chain

    steps:
      # Step 1: Check out the exact commit under review so every report maps to one source revision.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Prepare a predictable report directory used by every scanner/artifact step.
      - name: Prepare report directory
        run: mkdir -p "$REPORT_DIR"

      # Step 3: Resolve lower-case GHCR image names because OCI image references must be lower-case.
      - name: Resolve container image metadata
        id: image_meta
        env:
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag || '' }}
        run: |
          set -euo pipefail
          repo_lower="${GITHUB_REPOSITORY,,}"
          image_name="ghcr.io/${repo_lower}"
          short_sha="${GITHUB_SHA::12}"
          if [[ -n "${MANUAL_IMAGE_TAG}" ]]; then
            image_tag="${MANUAL_IMAGE_TAG}"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            image_tag="${GITHUB_REF_NAME}"
          else
            image_tag="sha-${short_sha}"
          fi
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${image_name}:${image_tag}" >> "$GITHUB_ENV"
          echo "image_ref=${image_name}:${image_tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ${image_name}:${image_tag}"

      # Step 4: Enable Buildx so the same workflow can later be extended to multi-arch images.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Step 5: Build the image locally for scanning. PRs do not push images or require registry writes.
      - name: Build local image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.IMAGE_REF }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=VulnoraIQ

      # Step 6: Run Trivy against the repository filesystem and save SARIF for code scanning.
      - name: Trivy filesystem scan SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: ${{ env.REPORT_DIR }}/trivy-filesystem.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          exit-code: "0"

      # Step 7: Upload filesystem SARIF to GitHub code scanning when the repository supports it.
      - name: Upload filesystem SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-filesystem.sarif
          category: trivy-filesystem

      # Step 8: Produce a human-readable filesystem scan table for reviewers and release evidence.
      - name: Trivy filesystem scan table
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: ${{ env.REPORT_DIR }}/trivy-filesystem.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          exit-code: "0"

      # Step 9: Run Trivy against the built container image and save SARIF for code scanning.
      - name: Trivy image scan SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: ${{ env.REPORT_DIR }}/trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          exit-code: "0"

      # Step 10: Upload image SARIF to GitHub code scanning when the repository supports it.
      - name: Upload image SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-image.sarif
          category: trivy-image

      # Step 11: Produce a human-readable image scan table for reviewers and release evidence.
      - name: Trivy image scan table
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          output: ${{ env.REPORT_DIR }}/trivy-image.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          exit-code: "0"

      # Step 12: Generate an SPDX JSON SBOM for the repository filesystem.
      - name: Generate filesystem SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: ${{ env.REPORT_DIR }}/vulnoraiq-filesystem.spdx.json
          scanners: vuln
          exit-code: "0"

      # Step 13: Generate a CycloneDX JSON SBOM for the built container image.
      - name: Generate image SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_REF }}
          format: cyclonedx
          output: ${{ env.REPORT_DIR }}/vulnoraiq-image.cdx.json
          scanners: vuln
          exit-code: "0"

      # Step 14: Optional fail-closed vulnerability gate for release candidates/manual hardening runs.
      - name: Enforce filesystem vulnerability gate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.enforce_security_gate }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          exit-code: "1"

      # Step 15: Optional fail-closed image vulnerability gate for release candidates/manual hardening runs.
      - name: Enforce image vulnerability gate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.enforce_security_gate }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          exit-code: "1"

      # Step 16: Decide whether this run should publish and sign a container image.
      - name: Decide publish policy
        id: publish_policy
        run: |
          set -euo pipefail
          should_publish="false"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            should_publish="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.publish_image }}" == "true" ]]; then
            should_publish="true"
          fi
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
          echo "SHOULD_PUBLISH=${should_publish}" >> "$GITHUB_ENV"
          echo "Publish image: ${should_publish}"

      # Step 17: Authenticate to GHCR only for publish-capable events, never for pull requests.
      - name: Login to GitHub Container Registry
        if: ${{ steps.publish_policy.outputs.should_publish == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 18: Push the already-scanned image to GHCR only after local scan/SBOM generation succeeds.
      - name: Push scanned image
        if: ${{ steps.publish_policy.outputs.should_publish == 'true' }}
        run: docker push "$IMAGE_REF"

      # Step 19: Install Cosign only when signing is needed.
      - name: Install Cosign
        if: ${{ steps.publish_policy.outputs.should_publish == 'true' }}
        uses: sigstore/cosign-installer@v4.1.0

      # Step 20: Sign the pushed image with keyless GitHub OIDC identity.
      - name: Sign image with Cosign keyless signing
        if: ${{ steps.publish_policy.outputs.should_publish == 'true' }}
        run: |
          set -euo pipefail
          cosign sign --yes "$IMAGE_REF"

      # Step 21: Verify the signature and save proof as an artifact for release review.
      - name: Verify Cosign signature
        if: ${{ steps.publish_policy.outputs.should_publish == 'true' }}
        run: |
          set -euo pipefail
          cosign verify "$IMAGE_REF" \
            --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/security-supply-chain.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            | tee "$REPORT_DIR/cosign-verify.txt"

      # Step 22: Write a compact job summary so reviewers can understand every output quickly.
      - name: Write security summary
        if: always()
        run: |
          {
            echo "## VulnoraIQ security supply-chain summary"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${IMAGE_REF}\` |"
            echo "| Published to GHCR | \`${SHOULD_PUBLISH:-false}\` |"
            echo "| Filesystem SARIF | \`trivy-filesystem.sarif\` |"
            echo "| Image SARIF | \`trivy-image.sarif\` |"
            echo "| Filesystem SBOM | \`vulnoraiq-filesystem.spdx.json\` |"
            echo "| Image SBOM | \`vulnoraiq-image.cdx.json\` |"
            echo "| Cosign verification | \`cosign-verify.txt\` when image publishing is enabled |"
            echo
            echo "Security artifacts are uploaded under the \`vulnoraiq-security-supply-chain-*\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      # Step 23: Upload all machine-readable and human-readable security outputs.
      - name: Upload security supply-chain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-security-supply-chain-${{ github.sha }}
          path: reports/output/security-supply-chain/**
          if-no-files-found: warn
