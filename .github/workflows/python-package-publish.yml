name: Build Python Package

on:
  workflow_dispatch:
    inputs:
      publish_to:
        description: "Where to publish after building"
        required: true
        type: choice
        default: "none"
        options:
          - none
          - testpypi
          - pypi
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-python-package:
    name: Build wheel and source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[release]

      - name: Validate release metadata and readiness
        run: |
          python scripts/validate_package_metadata.py
          python scripts/validate_owasp_atlas_mappings.py
          python scripts/validate_genai_readiness.py
          python scripts/validate_production_testing_readiness.py --output-dir reports/output/production-readiness

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-python-package-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build-python-package
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: vulnoraiq-python-package-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build-python-package
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to == 'pypi'
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: vulnoraiq-python-package-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
