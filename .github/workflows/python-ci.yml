name: Retired Python CI

# The normal Python CI gate is consolidated into .github/workflows/ci.yml.
# This workflow is intentionally manual-only so it does not add duplicate
# pull_request or main-branch checks. It remains as a compatibility marker for
# readiness validators that still verify the historical python-ci.yml path.
# Consolidated CI coverage includes: pip check, pip-audit, ruff check, mypy, pytest.

on:
  workflow_dispatch:

jobs:
  retired:
    name: Retired duplicate workflow
    runs-on: ubuntu-latest
    steps:
      - name: Use consolidated CI
        run: |
          echo "Python CI has been consolidated into .github/workflows/ci.yml."
          echo "No duplicate pull_request or main checks run from this workflow."
          echo "ci.yml is the source of truth for pip check, pip-audit, ruff check, mypy, and pytest."
