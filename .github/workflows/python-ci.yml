name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pip-audit

      - name: Dependency consistency check
        run: python -m pip check

      - name: Dependency vulnerability audit
        run: python -m pip_audit

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy --explicit-package-bases .

      - name: Run tests
        run: |
          mkdir -p reports/output/ci-logs
          pytest 2>&1 | tee reports/output/ci-logs/python-ci-pytest-${{ matrix.python-version }}.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-python-ci-pytest-log-${{ matrix.python-version }}
          path: reports/output/ci-logs/python-ci-pytest-${{ matrix.python-version }}.log

      - name: Validate Web UI package wiring
        run: python -c "from webui.hosted_server import STATIC_DIR, load_config; console = STATIC_DIR / 'console'; assert (console / 'index.html').exists(); assert any((console / 'assets').glob('*.js')); assert any((console / 'assets').glob('*.css')); cfg = load_config(); assert 'demo' in cfg['targets']; assert 'baseline' in cfg['profiles']"

      - name: Validate package metadata
        run: python scripts/validate_package_metadata.py

      - name: Validate OWASP/MITRE mapping metadata
        run: python scripts/validate_owasp_atlas_mappings.py

      - name: Validate GenAI security readiness
        run: python scripts/validate_genai_readiness.py

      - name: Validate target contracts
        run: python -c "from integrations.contract_validation import TargetContractValidator; result = TargetContractValidator().validate(); assert result.status in {'pass', 'warn'}; assert not result.errors"

      - name: Validate benchmark fixtures
        run: python -c "from benchmarks.fixture_validation import BenchmarkFixtureValidator; result = BenchmarkFixtureValidator().validate(); assert result.status == 'pass'"

      - name: Run functional acceptance test
        run: |
          python scripts/run_functional_test.py \
            --output-dir reports/output/functional-test

      - name: Run baseline assessment smoke test
        run: |
          python scripts/run_scan.py --target demo --profile baseline \
            --output reports/output/baseline-report.md \
            --json-output reports/output/baseline-report.json \
            --sarif-output reports/output/baseline-report.sarif \
            --dashboard-output reports/output/baseline-dashboard.md \
            --html-dashboard-output reports/output/baseline-dashboard.html

      - name: Run RAG assessment smoke test
        run: |
          python scripts/run_scan.py --target demo --profile rag \
            --output reports/output/rag-report.md \
            --json-output reports/output/rag-report.json \
            --sarif-output reports/output/rag-report.sarif \
            --dashboard-output reports/output/rag-dashboard.md \
            --html-dashboard-output reports/output/rag-dashboard.html

      - name: Run agent assessment smoke test
        run: |
          python scripts/run_scan.py --target demo --profile agent \
            --output reports/output/agent-report.md \
            --json-output reports/output/agent-report.json \
            --sarif-output reports/output/agent-report.sarif \
            --dashboard-output reports/output/agent-dashboard.md \
            --html-dashboard-output reports/output/agent-dashboard.html

      - name: Run report diff smoke test
        run: |
          python -m reports.report_diff \
            --baseline reports/output/baseline-report.json \
            --current reports/output/rag-report.json \
            --json-output reports/output/baseline-vs-rag-diff.json \
            --markdown-output reports/output/baseline-vs-rag-diff.md

      - name: Build policy trend
        run: |
          python -m reports.policy_trends \
            --input-dir reports/output \
            --json-output reports/output/policy-trend.json \
            --markdown-output reports/output/policy-trend.md

      - name: Build diff trend dashboard
        run: |
          python -m dashboards.diff_trend_dashboard \
            --input-dir reports/output \
            --markdown-output reports/output/diff-trend-dashboard.md \
            --html-output reports/output/diff-trend-dashboard.html

      - name: Run regression benchmarks
        run: |
          python -m benchmarks.run_benchmarks \
            --manifest benchmarks/benchmark_suite.yaml \
            --output-dir reports/output/benchmarks \
            --summary-output reports/output/benchmarks/benchmark-summary.json \
            --fail-on-regression

      - name: Build branded HTML export package
        run: python -m reports.html_export_package --input-dir reports/output --output reports/output/vulnoraiq-html-export.zip

      - name: Build release package smoke test
        run: python scripts/build_release_package.py --manifest config/release_package.yaml

      - name: Upload VulnoraIQ demo reports and release package
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-demo-reports-${{ matrix.python-version }}
          path: |
            reports/output/
            dist/vulnoraiq-example-package.zip
