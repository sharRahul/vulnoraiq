name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pip-audit

      - name: Dependency consistency check
        run: python -m pip check

      - name: Dependency vulnerability audit
        run: python -m pip_audit

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy --explicit-package-bases .

      - name: Run tests
        run: |
          mkdir -p reports/output/ci-logs
          pytest 2>&1 | tee reports/output/ci-logs/python-ci-pytest-${{ matrix.python-version }}.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-python-ci-pytest-log-${{ matrix.python-version }}
          path: reports/output/ci-logs/python-ci-pytest-${{ matrix.python-version }}.log

      - name: Validate Web UI package wiring
        run: |
          python - <<'PY'
          from webui.hosted_server import STATIC_DIR, load_config
          assert (STATIC_DIR / 'index.html').exists()
          assert (STATIC_DIR / 'styles.css').exists()
          assert (STATIC_DIR / 'app.js').exists()
          config = load_config()
          assert 'demo' in config['targets']
          assert 'baseline' in config['profiles']
          PY

      - name: Validate package metadata
        run: python scripts/validate_package_metadata.py

      - name: Validate OWASP/MITRE mapping metadata
        run: python scripts/validate_owasp_atlas_mappings.py

      - name: Validate GenAI security readiness
        run: python scripts/validate_genai_readiness.py

      - name: Run functional acceptance test
        run: python scripts/run_functional_test.py --output-dir reports/output/functional-test

      - name: Build release package smoke test
        run: python scripts/build_release_package.py --manifest config/release_package.yaml
