name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run baseline assessment smoke test
        run: |
          python scripts/run_scan.py --target demo --profile baseline \
            --output reports/output/baseline-report.md \
            --json-output reports/output/baseline-report.json \
            --sarif-output reports/output/baseline-report.sarif \
            --dashboard-output reports/output/baseline-dashboard.md \
            --html-dashboard-output reports/output/baseline-dashboard.html

      - name: Run RAG assessment smoke test
        run: |
          python scripts/run_scan.py --target demo --profile rag \
            --output reports/output/rag-report.md \
            --json-output reports/output/rag-report.json \
            --sarif-output reports/output/rag-report.sarif \
            --dashboard-output reports/output/rag-dashboard.md \
            --html-dashboard-output reports/output/rag-dashboard.html

      - name: Run agent assessment smoke test
        run: |
          python scripts/run_scan.py --target demo --profile agent \
            --output reports/output/agent-report.md \
            --json-output reports/output/agent-report.json \
            --sarif-output reports/output/agent-report.sarif \
            --dashboard-output reports/output/agent-dashboard.md \
            --html-dashboard-output reports/output/agent-dashboard.html

      - name: Run report diff smoke test
        run: |
          python -m reports.report_diff \
            --baseline reports/output/baseline-report.json \
            --current reports/output/rag-report.json \
            --json-output reports/output/baseline-vs-rag-diff.json \
            --markdown-output reports/output/baseline-vs-rag-diff.md

      - name: Upload demo reports
        uses: actions/upload-artifact@v4
        with:
          name: llm-vapt-demo-reports-${{ matrix.python-version }}
          path: reports/output/
