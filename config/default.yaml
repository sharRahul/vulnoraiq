framework:
  name: vulnoraiq
  display_name: VulnoraIQ
  version: 0.0.1.6
  safe_mode: true

execution:
  max_payloads_per_module: 5
  request_timeout_seconds: 30

payload_libraries:
  - safe_baseline
  - rag_readiness
  - agent_readiness

risk_model:
  thresholds:
    low: 2.0
    medium: 4.0
    high: 7.0
    critical: 9.0

reporting:
  default_output: reports/output/scan-report.md
  json_output: reports/output/scan-report.json
  sarif_output: reports/output/scan-report.sarif
  dashboard_output: reports/output/dashboard.md
  html_dashboard_output: reports/output/dashboard.html
  diff_json_output: reports/output/report-diff.json
  diff_markdown_output: reports/output/report-diff.md
  policy_trend_json_output: reports/output/policy-trend.json
  policy_trend_markdown_output: reports/output/policy-trend.md
  diff_trend_markdown_output: reports/output/diff-trend-dashboard.md
  diff_trend_html_output: reports/output/diff-trend-dashboard.html
  html_export_output: reports/output/vulnoraiq-html-export.zip
  include_evidence: true

web_ui:
  host: 127.0.0.1
  port: 8787
  output_root: reports/output/webui
  users_path: config/web_users.yaml
  job_store_path: reports/output/webui/jobs.json

approval_gates:
  high_impact_actions_require_approval: true
  approval_record_required: true
  approval_evidence_path: config/approval_evidence.yaml

rag_corpus:
  manifest_path: config/rag_corpus_manifest.yaml
  retrieval_scenarios_path: config/rag_retrieval_scenarios.yaml
  hash_algorithm: sha256
  approval_required: true

agent_runtime:
  manifest_path: config/agent_runtime.yaml
  execution_scenarios_path: config/agent_execution_scenarios.yaml

mitre_atlas:
  mapping_path: config/mitre_atlas_mapping.yaml
  refresh_config_path: config/atlas_refresh.yaml
  source_url: https://raw.githubusercontent.com/mitre-atlas/atlas-data/main/dist/v6/ATLAS-2026.05.yaml
  source_fixture_path: config/mitre_atlas_source_fixture.yaml
  matrix_doc_path: docs/MITRE_ATLAS_AI_MATRIX.md

benchmarks:
  manifest_path: benchmarks/benchmark_suite.yaml
  fixture_path: benchmarks/fixtures/owasp_starter_fixture.yaml
  output_dir: reports/output/benchmarks

target_contracts:
  manifest_path: config/target_contracts.yaml

release_package:
  manifest_path: config/release_package.yaml

package_metadata:
  validation_required: true
