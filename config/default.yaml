framework:
  name: llm-vapt-framework
  version: 0.6.0
  safe_mode: true

execution:
  max_payloads_per_module: 5
  request_timeout_seconds: 30

payload_libraries:
  - safe_baseline
  - rag_readiness
  - agent_readiness

risk_model:
  thresholds:
    low: 2.0
    medium: 4.0
    high: 7.0
    critical: 9.0

reporting:
  default_output: reports/output/scan-report.md
  json_output: reports/output/scan-report.json
  sarif_output: reports/output/scan-report.sarif
  dashboard_output: reports/output/dashboard.md
  html_dashboard_output: reports/output/dashboard.html
  include_evidence: true

approval_gates:
  high_impact_actions_require_approval: true
  approval_record_required: true

rag_corpus:
  manifest_path: config/rag_corpus_manifest.yaml
  hash_algorithm: sha256
  approval_required: true

agent_runtime:
  manifest_path: config/agent_runtime.yaml
