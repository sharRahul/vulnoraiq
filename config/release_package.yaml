name: vulnoraiq-example-package
version: 1
output_path: dist/vulnoraiq-example-package.zip
include_paths:
  - README.md
  - THIRD_PARTY_NOTICES.md
  - docs/IMPLEMENTATION_STATUS.md
  - docs/module-authoring.md
  - docs/web-ui.md
  - docs/MITRE_ATLAS_AI_MATRIX.md
  - docs/owasp/
  - config/default.yaml
  - config/targets.yaml
  - config/target_contracts.yaml
  - config/web_users.yaml
  - config/report_branding.yaml
  - config/attack_profiles.yaml
  - config/policies.yaml
  - config/policy_exceptions.yaml
  - config/approval_evidence.yaml
  - config/owasp_oracles.yaml
  - config/mitre_atlas_mapping.yaml
  - config/atlas_refresh.yaml
  - config/mitre_atlas_source_fixture.yaml
  - config/rag_corpus_manifest.yaml
  - config/rag_retrieval_scenarios.yaml
  - config/agent_runtime.yaml
  - config/agent_execution_scenarios.yaml
  - config/release_package.yaml
  - core/evaluators.py
  - scripts/generate_mitre_atlas_matrix.py
  - benchmarks/benchmark_suite.yaml
  - benchmarks/fixtures/owasp_starter_fixture.yaml
  - examples/local_demo_targets/README.md
  - examples/local_demo_targets/owasp_fixture_targets.py
  - payloads/schema.yaml
  - payloads/safe_baseline.yaml
  - payloads/rag_readiness.yaml
  - payloads/agent_readiness.yaml
  - reports/output/
rules:
  - Include only local demo outputs and non-sensitive configuration files.
  - Include third-party notices whenever generated ATLAS-derived documentation is included.
  - Exclude private operational material and real client evidence.
  - Review generated reports before publishing a release package.
