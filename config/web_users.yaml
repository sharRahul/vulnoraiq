# Web UI authentication configuration.
#
# Local Desktop Mode and Docker Lab Mode are designed as single-user/admin
# sessions on 127.0.0.1. Their launchers set VULNORAIQ_AUTH_ENABLED=false,
# which resolves API requests to the built-in local-admin principal.
#
# For production or shared internal server deployments, explicitly enable auth
# and provide environment tokens:
#   VULNORAIQ_ENV=production
#   VULNORAIQ_AUTH_ENABLED=true
#   VULNORAIQ_ADMIN_TOKEN=<strong-random-token>
#   VULNORAIQ_ANALYST_TOKEN=<analyst-token>
#   VULNORAIQ_VIEWER_TOKEN=<viewer-token>
#
# When env token vars are set, file-based users are ignored.
# This file is used only as a fallback when no token env vars are present.
#
# IMPORTANT: The token hashes in this file are example-only values.
# Replace them with real SHA-256 hashes for any non-development deployment.
# See config/web_users.example.yaml for a template.

auth:
  enabled: true
  default_role: viewer
  header_name: X-VulnoraIQ-Token
users: []
roles:
  viewer:
    permissions:
      - view_scans
      - download_artifacts
  analyst:
    inherits:
      - viewer
    permissions: []
  admin:
    inherits:
      - analyst
    permissions:
      - start_configured_scan
      - manage_runtime
