# Web UI authentication configuration.
#
# Auth is enabled by default. In production, set these env vars:
#   VULNORAIQ_AUTH_ENABLED=true
#   VULNORAIQ_ADMIN_TOKEN=<strong-random-token>
#   VULNORAIQ_ANALYST_TOKEN=<analyst-token>
#   VULNORAIQ_VIEWER_TOKEN=<viewer-token>
#
# The file-based user list below is used only when no token env vars are set.
# The hashes below are for demo/development only -- replace in production.

auth:
  enabled: true
  default_role: viewer
  header_name: X-VulnoraIQ-Token
users:
  - username: admin
    role: admin
    token_hash: 8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
    status: active
  - username: analyst
    role: analyst
    token_hash: f44e64e75f3948e9f73f8dfa94721c4ce8cbb4f265c4790c702b2d41cfbf2753
    status: active
roles:
  viewer:
    permissions:
      - view_scans
      - download_artifacts
  analyst:
    inherits:
      - viewer
    permissions:
      - start_demo_scan
  admin:
    inherits:
      - analyst
    permissions:
      - start_configured_scan
      - manage_runtime
