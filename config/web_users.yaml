# Web UI authentication configuration.
#
# Local Desktop Mode uses VULNORAIQ_AUTH_MODE=local_admin, which resolves
# requests to the built-in local-admin principal. This is only for local,
# single-user/admin operation and startup validation rejects it in production.
#
# For production or shared internal server deployments, explicitly enable token
# auth and provide environment tokens:
#   VULNORAIQ_ENV=production
#   VULNORAIQ_AUTH_MODE=token
#   VULNORAIQ_ADMIN_TOKEN=<strong-random-token>
#   VULNORAIQ_ANALYST_TOKEN=<analyst-token>
#   VULNORAIQ_VIEWER_TOKEN=<viewer-token>
#
# VULNORAIQ_AUTH_ENABLED=false is kept only as a backward-compatible alias for
# VULNORAIQ_AUTH_MODE=local_admin. New launchers should use VULNORAIQ_AUTH_MODE.
#
# When env token vars are set, file-based users are ignored.
# This file is used only as a fallback when no token env vars are present.
#
# IMPORTANT: The token hashes in this file are example-only values.
# Replace them with real SHA-256 hashes for any non-development deployment.
# See config/web_users.example.yaml for a template.

auth:
  enabled: true
  default_role: viewer
  header_name: X-VulnoraIQ-Token
users: []
roles:
  viewer:
    permissions:
      - view_scans
      - download_artifacts
  analyst:
    inherits:
      - viewer
    permissions: []
  admin:
    inherits:
      - analyst
    permissions:
      - start_configured_scan
      - manage_runtime
