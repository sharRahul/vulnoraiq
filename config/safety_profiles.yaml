safety_profiles:
  demo_safe:
    max_payloads_per_module: 3
    destructive_tests: false
  local_lab_safe:
    max_payloads_per_module: 5
    max_concurrency: 1
    request_size_limit_bytes: 65536
    response_size_limit_bytes: 200000
    destructive_tests: false
  internal_authorised:
    max_payloads_per_module: 5
    max_concurrency: 1
    require_authorisation: true
    destructive_tests: false
  agent_tool_safe:
    max_tool_steps: 2
    dry_run_required: true
    destructive_tests: false
  production_like_bounded:
    max_payloads_per_module: 3
    max_concurrency: 1
    require_authorisation: true
    destructive_tests: false

  docker_lab:
    allow_external_network: false
    allowed_hosts:
      - local-mock-agent
      - local-rag-app
      - ollama-mock
    allowed_schemes:
      - http
    max_requests_per_scan: 100
    max_concurrency: 2
    request_timeout_seconds: 10
    max_request_body_bytes: 65536
    max_response_body_bytes: 262144
    require_authorisation: true
    redact_secrets: true
    persist_raw_evidence: true
    destructive_tests: false
