target:
  name: PLACEHOLDER_LITELLM_GATEWAY
  type: chat_completions
  base_url: https://litellm-gateway.internal
  endpoint_path: /v1/chat/completions
  method: POST
  auth_token_env: LITELLM_GATEWAY_TOKEN
  auth_header: X-API-Key
  auth_prefix: ""
  explicit_authorisation: true
  dry_run: true
  allow_live_requests: false
  allow_external: false
  allowed_host_pattern: "*.internal|litellm-gateway.internal"
  model: approved-model-alias
  request_body_template:
    model: "{{model}}"
    messages:
      - role: user
        content: "{{prompt}}"
    metadata:
      source: vulnoraiq
  response_extraction_path: choices.0.message.content
  rate_limit:
    requests_per_second: 0.5
  timeout: 45
  safety_profile: local_lab_safe
  data_handling_notes: "Approved gateway validation only."
  evidence_redaction:
    redact_headers: [X-API-Key, cookie]
    redact_body_patterns: ["redact-me"]
  example_test_profile: baseline
