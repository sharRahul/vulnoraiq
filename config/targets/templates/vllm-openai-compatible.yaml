target:
  name: PLACEHOLDER_VLLM_LOCAL
  type: chat_completions
  base_url: http://127.0.0.1:8000
  endpoint_path: /v1/chat/completions
  method: POST
  auth_token_env: VLLM_API_KEY
  auth_header: X-API-Key
  auth_prefix: ""
  explicit_authorisation: true
  dry_run: true
  allow_live_requests: false
  allowed_host_pattern: "127.0.0.1|localhost|*.internal"
  model: local-model
  request_body_template:
    model: "{{model}}"
    messages:
      - role: user
        content: "{{prompt}}"
    temperature: 0
  response_extraction_path: choices.0.message.content
  rate_limit:
    requests_per_second: 1
  timeout: 60
  safety_profile: local_lab_safe
  data_handling_notes: "Local or internal vLLM validation only; use redacted assessment prompts."
  evidence_redaction:
    redact_headers: [X-API-Key, cookie]
    redact_body_patterns: ["token=[A-Za-z0-9._-]+"]
  example_test_profile: baseline
