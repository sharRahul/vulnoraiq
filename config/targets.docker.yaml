targets:
  local_mock_agent:
    name: Local Mock AI Agent
    type: chat_completions
    base_url: http://local-mock-agent:9090
    endpoint_path: /v1/chat/completions
    method: POST
    auth: {type: none}
    request_template:
      model: mock-agent
      messages:
        - role: user
          content: "{{ payload }}"
    response_extraction: {path: choices.0.message.content}
    timeout_seconds: 10
    rate_limit_per_minute: 30
    authorised_required: true
    authorisation_required: true
    safety_profile: docker_lab
    environment: docker_lab
    owner: local-test
    tags: [docker, mock, ai-agent]
    health_prompt: "Health check: reply with OK."
  local_rag_app:
    name: Local Mock RAG App
    type: rag_query
    base_url: http://local-mock-agent:9090
    endpoint_path: /rag/query
    method: POST
    request_template: {query: "{{ payload }}", include_context: true}
    response_extraction: {path: answer}
    retrieval_context_path: context
    timeout_seconds: 10
    rate_limit_per_minute: 30
    authorised_required: true
    authorisation_required: true
    safety_profile: docker_lab
    environment: docker_lab
    owner: local-test
    tags: [docker, mock, rag]
  local_mock_ollama:
    name: Local Mock Ollama Generate
    type: ollama_generate
    base_url: http://local-mock-agent:9090
    endpoint_path: /api/generate
    method: POST
    model: mock-agent
    response_extraction: {path: response}
    timeout_seconds: 10
    rate_limit_per_minute: 30
    authorised_required: true
    authorisation_required: true
    safety_profile: docker_lab
    environment: docker_lab
    owner: local-test
    tags: [docker, mock, ollama]
  local_webhook_agent:
    name: Local Webhook Mock Agent
    type: webhook_json
    base_url: http://local-mock-agent:9090
    endpoint_path: /webhook
    method: POST
    request_template: {input: "{{ payload }}", source: vulnoraiq-docker-lab}
    response_extraction: {path: output}
    timeout_seconds: 10
    rate_limit_per_minute: 30
    authorised_required: true
    authorisation_required: true
    safety_profile: docker_lab
    environment: docker_lab
    owner: local-test
    tags: [docker, mock, webhook]
  local_agent_tool_loop:
    name: Local Agent Tool Loop Mock
    type: agent_tool_loop
    base_url: http://local-mock-agent:9090
    endpoint_path: /agent/tool-loop
    method: POST
    request_template: {input: "{{ payload }}", max_steps: 2, dry_run: true}
    response_extraction: {path: answer}
    tool_calls_path: tool_calls
    timeout_seconds: 10
    rate_limit_per_minute: 30
    authorised_required: true
    authorisation_required: true
    safety_profile: docker_lab
    environment: docker_lab
    owner: local-test
    tags: [docker, mock, agentic]
